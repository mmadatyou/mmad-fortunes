<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Fortune Cookie</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #fff8e7; margin: 0; }
        img { width: 300px; height: 300px; object-fit: cover; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <img id="fortuneImage" src="" alt="Your Fortune">

        <script>
        // 1. Set your exact image number
        const totalImages = 12; 

        // 2. Pick a random number
        const randomNumber = Math.floor(Math.random() * totalImages) + 1;

        // 3. Create a unique time stamp to bypass memory caches
        const cacheBuster = new Date().getTime();

        // 4. Force load the image cleanly (Adjust the 'fortune' text if yours uses a capital F)
        document.getElementById('fortune-cookie').src = 'fortune' + randomNumber + '.jpg?v=' + cacheBuster;
    </script>
